# ⚡ How to actually pull it off (important)

## 🧠 Don’t aim to “finish problems”

👉 Aim to **understand patterns**

If you do this:

* 10 problems deeply ✅ → you’re ready
* 25 problems shallow ❌ → you’ll struggle

---

# 🚀 Suggested 3-day plan (best balance)

## 🔥 Day 1 — Arrays & Strings (MOST IMPORTANT)

Do:

* Reverse string
* Palindrome
* Count frequency
* Remove duplicates
* Max/min
* Two sum

👉 Spend time understanding:

* loops vs map/filter
* using objects for counting

---

## ⚙️ Day 2 — Objects + Async JS

Do:

* Group by property
* Flatten array
* Debounce (important ⭐)
* Promise example
* setTimeout output questions

👉 Focus on:

* Event loop (VERY important)
* async/await clarity

---

## 🧠 Day 3 — Revision + Confidence

* Redo 5–6 problems without seeing solution
* Practice explaining out loud
* Go through:

  * Hoisting
  * Closures
  * `this` (basic idea)

---

# 🔥 Golden rule (this will save you)

For every problem, be able to answer:

👉 “Why did I use this approach?”

Example:

* Why object for counting?
* Why two pointers?
* Why setTimeout behaves like that?

---

# ❗ Common mistake to avoid

Don’t do this:

* Watching solution → “yeah I get it” → move on ❌

Do this:

* Solve → get stuck → try → then check → redo ✅

